apiVersion: apps/v1
kind: Deployment
metadata:
  name: pride-frontend
  labels:
    app: pride-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pride-frontend
  template:
    metadata:
      labels:
        app: pride-frontend
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        fsGroup: 20000
        runAsNonRoot: true
      containers:
      - name: frontend
        image: pride-auto-store-frontend:1.0.0
        imagePullPolicy: Always
        securityContext:
          capabilities:
            drop:
              - ALL
          runAsUser: 10001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
            ephemeral-storage: "1Gi"
          limits:
            cpu: "500m"
            memory: "512Mi"
            ephemeral-storage: "2Gi"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 20"]
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pride-frontend-service
spec:
  selector:
    app: pride-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
  loadBalancerSourceRanges:
  - 0.0.0.0/0 # Restricted to world by default, update with specific CIDRs if known
