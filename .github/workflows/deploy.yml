name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: Normalize image repository
        id: image-repo
        shell: bash
        run: |
          IMAGE_REPO="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.image-repo.outputs.image_repo }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image-repo.outputs.image_repo }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-repo.outputs.image_repo }}/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Scan backend image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-repo.outputs.image_repo }}/backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: '.'

  deploy-frontend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl --fail --silent --show-error -X POST "$HOOK_URL"
          else
            echo "Skipping Vercel deploy: VERCEL_DEPLOY_HOOK_URL is not set."
          fi

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl --fail --silent --show-error -X POST "$HOOK_URL"
          else
            echo "Skipping Render deploy: RENDER_DEPLOY_HOOK_URL is not set."
          fi
