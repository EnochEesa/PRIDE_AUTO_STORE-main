version: "3.8"

services:

  mongodb:
    image: mongo
    container_name: pride_mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: pride_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/pride_auto_store
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: pride_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
